version: "3.8"

# =====================================================
# SatisfyCAM - Portainer Stack (com imagem pre-built)
# =====================================================
#
# PRE-REQUISITO: Build da imagem no VPS antes de criar o stack:
#
#   1. Envie o codigo para o VPS:
#      rsync -avz --exclude node_modules --exclude .next --exclude .git \
#        ./ root@31.97.162.61:/opt/satisfycam-build/
#
#   2. Faca o build da imagem Docker no VPS:
#      ssh root@31.97.162.61 "cd /opt/satisfycam-build && docker build -t satisfycam:latest ."
#
#   3. No Portainer:
#      Stacks > Add Stack > Web Editor > Cole este arquivo
#      Preencha as Environment Variables:
#        JWT_SECRET = (gere com: openssl rand -base64 32)
#        STORE_NAME = Barbearia VIP - Centro
#
# Para atualizar:
#   Repita os passos 1 e 2, depois no Portainer clique "Update the stack"
# =====================================================

services:
  app:
    image: satisfycam:latest
    container_name: satisfycam-app
    restart: unless-stopped
    ports:
      - "3007:3007"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/prod.db
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - SNAPSHOT_STORAGE_PATH=/app/data/snapshots
      - NEXT_PUBLIC_APP_NAME=SatisfyCAM
      - NEXT_PUBLIC_STORE_NAME=${STORE_NAME:-Barbearia VIP Santa Mônica}
      - PORT=3007
      - HOSTNAME=0.0.0.0
    volumes:
      - satisfycam-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3007/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  satisfycam-data:
